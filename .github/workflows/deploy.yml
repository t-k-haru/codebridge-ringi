name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Azureにログイン
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ZIPを作成してデプロイ
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".env" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "*.zip" \
            -x ".DS_Store" \
            -x "webapp_logs/*"
          az webapp deploy \
            --name codebridge-t-k-haru \
            --resource-group codebridge-rg \
            --src-path deploy.zip \
            --type zip \
            --async true
