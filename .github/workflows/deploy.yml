name: Deploy to Azure App Service

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        run: |
          zip -r app.zip . \
            -x "*.zip" ".git/*" ".env" \
            "__pycache__/*" "*.pyc" ".DS_Store"
          az webapp deploy \
            --name codebridge-ringi \
            --resource-group codebridge-rg \
            --src-path app.zip \
            --type zip \
            --async true
